<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body>
    <div id="calculator">
    <div id="display"></div>
    <div id="buttons">

    <button id="b1" class="btn-1" value="1">1</button>
    <button id="b2" class="btn-2" value="2">2</button>
    <button id="b3" class="btn-3" value="3">3</button>
    <button id="clear" class="btn-4" value="C">C</button>
    <button id="b4" class="btn-5" value="4">4</button>
    <button id="b5" class="btn-6" value="5">5</button>
    <button id="b6" class="btn-7" value="6">6</button>
    <button id="divide" class="btn-/" value="/">/</button>
    <button id="b7" class="btn-7" value="7">7</button>
    <button id="b8" class="btn-8" value="8">8</button>
    <button id="b9" class="btn-9" value="9">9</button>
    <button id="subtract" class="btn-10" value="-">-</button>
    <button id="add" class="btn-11" value="+">+</button>
    <button id="b0" class="btn-0" value="0">0</button>    
    <button id="multiply" class="btn-multiply" value="*">*</button>
    <button id="equal" class="btn-equal" value="=">=</button>
    <button id="decimal" class="btn-decimal" value=".">.</button>
    </div>
</div>
    <script src="script.js"></script>   
</body>

</html>
